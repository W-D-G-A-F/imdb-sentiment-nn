name: Train & Deploy
on:
  push:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface-hub

      - name: Train model
        run: python train.py

      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # 上传单个文件（语法：hf upload repo_id local_path:repo_path）
          hf upload asasdj/imdb-sentiment-nn app.py:app.py --repo-type space
          hf upload asasdj/imdb-sentiment-nn requirements.txt:requirements.txt --repo-type space
          hf upload asasdj/imdb-sentiment-nn model/tfidf.pkl:model/tfidf.pkl --repo-type space
          hf upload asasdj/imdb-sentiment-nn model/imdb_nn_model.h5:model/imdb_nn_model.h5 --repo-type space
