name: Train & Deploy
on:
  push:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          # 自动修复 requirements.txt 第一行的无用标记
          sed -i 's/\\]//g' requirements.txt
          
          # 安装依赖
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface-hub

      - name: Train model
        run: |
          python train.py

      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 核心：必须把包含空间配置的 README.md 也传给 Hugging Face！
          hf upload asasdj/imdb-sentiment-nn ./README.md README.md --repo-type space
          
          # 2. 上传应用文件、依赖和模型文件夹
          hf upload asasdj/imdb-sentiment-nn ./app.py app.py --repo-type space
          hf upload asasdj/imdb-sentiment-nn ./requirements.txt requirements.txt --repo-type space
          hf upload asasdj/imdb-sentiment-nn ./model model --repo-type space