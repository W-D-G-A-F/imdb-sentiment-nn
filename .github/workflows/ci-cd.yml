name: Train & Deploy
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: python train.py
      - uses: gradio/actions/hf-deploy@v1
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
