name: Train & Deploy to HF
on:
  push:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface-hub

      - name: Train model
        run: python train.py

      # 这里是关键：用 hf 命令一次性上传所有文件
      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 先登录
          hf auth login --token $HF_TOKEN
          
          # 上传 app.py
          hf upload asasdj/imdb-sentiment-nn app.py --repo-type space
          
          # 上传 requirements.txt
          hf upload asasdj/imdb-sentiment-nn requirements.txt --repo-type space
          
          # 上传整个 model 文件夹（包括所有子文件）
          hf upload asasdj/imdb-sentiment-nn model --repo-type space --recursive
