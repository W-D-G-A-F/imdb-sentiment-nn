name: Train & Deploy to Hugging Face
on:
  push:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface-hub

      - name: Train model
        run: python train.py

      - name: Deploy to Hugging Face (using new hf command)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 登录Hugging Face
          hf auth login --token $HF_TOKEN
          
          # 上传所有文件到你的Space
          hf upload asasdj/imdb-sentiment-nn app.py --repo-type space
          hf upload asasdj/imdb-sentiment-nn requirements.txt --repo-type space
          hf upload asasdj/imdb-sentiment-nn model/ --repo-type space --include "model/*"
