name: Train & Deploy to HF
on:
  push:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface-hub

      - name: Train model
        run: python train.py

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # 上传单个文件
          hf upload asasdj/imdb-sentiment-nn app.py --repo-type space
          hf upload asasdj/imdb-sentiment-nn requirements.txt --repo-type space
          
          # 上传 model 文件夹里的所有文件（用通配符）
          hf upload asasdj/imdb-sentiment-nn model/tfidf.pkl --repo-type space --path-in-repo model/tfidf.pkl
          hf upload asasdj/imdb-sentiment-nn model/imdb_nn_model.h5 --repo-type space --path-in-repo model/imdb_nn_model.h5
