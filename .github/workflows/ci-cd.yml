name: Train & Deploy to Hugging Face
on:
  push:
    branches: [ main ]
jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface_hub

      - name: Train model
        run: python train.py

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 替换成你自己的 HF 用户名和空间名
          HF_USER="Swb20"
          HF_SPACE="imdb-sentiment-nn"
          git config --global user.email "swb20@example.com"
          git config --global user.name "Swb20"
          huggingface-cli repo create $HF_SPACE --type space --space_sdk gradio --yes
          git clone https://huggingface.co/spaces/$HF_USER/$HF_SPACE deploy
          cp app.py requirements.txt deploy/
          cp -r model/ deploy/
          cd deploy
          git add .
          git commit -m "Deploy from GitHub CI/CD" || echo "Nothing to commit"
          git push https://$HF_TOKEN@huggingface.co/spaces/$HF_USER/$HF_SPACE main
